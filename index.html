<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kettlebell">
<meta name="theme-color" content="#0a0a0a">
<title>Kettlebell Custom Pro</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --surface: #141414; --card: #1c1c1c; --accent: #e8ff00;
    --accent2: #ff4d00; --text: #f0f0f0; --muted: #666; --rest-color: #00c9a7;
    --work-color: #e8ff00; --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; min-height: 100dvh; padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); overflow-x: hidden; }

  header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px 12px; border-bottom: 1px solid #222; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; color: var(--accent); }
  
  /* タイマー・セクション */
  .timer-section { display: flex; flex-direction: column; align-items: center; padding: 20px 24px; position: relative; }
  .phase-label { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 5px; margin-bottom: 8px; color: var(--work-color); }
  .phase-label.rest { color: var(--rest-color); }
  .phase-label.prepare { color: var(--accent2); }

  .circle-wrap { position: relative; width: 170px; height: 170px; }
  svg.ring { width: 170px; height: 170px; transform: rotate(-90deg); }
  .ring-track { fill: none; stroke: #2a2a2a; stroke-width: 8; }
  .ring-progress { fill: none; stroke: var(--work-color); stroke-width: 8; stroke-linecap: round; stroke-dasharray: 502; stroke-dashoffset: 0; transition: stroke-dashoffset 0.9s linear, stroke 0.3s; }
  .ring-progress.rest { stroke: var(--rest-color); }
  .ring-progress.prepare { stroke: var(--accent2); }

  .timer-inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .timer-digits { font-family: 'Bebas Neue', sans-serif; font-size: 60px; line-height: 1; color: var(--text); }
  .timer-sub { font-size: 10px; color: var(--muted); letter-spacing: 2px; }

  /* エクササイズカード：部位表示を復活 */
  .exercise-card { background: var(--card); border: 1px solid #2a2a2a; border-radius: 16px; padding: 18px 20px; margin: 0 24px; position: relative; overflow: hidden; }
  .exercise-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--accent); }
  .exercise-card.rest-card::before { background: var(--rest-color); }
  .ex-number { font-family: 'Bebas Neue', sans-serif; font-size: 40px; color: #2a2a2a; position: absolute; right: 14px; top: 8px; }
  .ex-name { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--text); }
  .ex-name-jp { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .ex-muscle { font-size: 11px; color: var(--accent); font-weight: 700; background: rgba(232,255,0,0.1); padding: 2px 8px; border-radius: 4px; display: inline-block; }

  /* 次のトレーニングを大きく表示 */
  .next-up { margin: 12px 24px; display: flex; flex-direction: column; gap: 4px; }
  .next-label { font-size: 12px; color: var(--accent); font-weight: bold; letter-spacing: 1px; }
  .next-name { font-size: 22px; color: var(--text); font-weight: 700; }

  /* 下部ステータス（経過時間など）を復活 */
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 10px 24px; padding: 10px 0; border-top: 1px solid #222; }
  .stat-box { text-align: center; }
  .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 20px; display: block; color: var(--text); }
  .stat-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  .progress-section { margin: 0 24px 10px; }
  .progress-dots { display: flex; gap: 4px; flex-wrap: wrap; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #2a2a2a; }
  .dot.done { background: var(--accent); }
  .dot.active { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

  .controls { display: flex; gap: 12px; padding: 0 24px 24px; }
  .btn { border: none; cursor: pointer; border-radius: 50px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; }
  .btn-main { background: var(--accent); color: #000; font-size: 18px; padding: 14px; flex: 2; }
  .btn-sub { background: var(--card); color: var(--text); font-size: 14px; padding: 14px; flex: 1; border: 1px solid #2a2a2a; }

  /* 設定画面 */
  .settings-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.9); overflow-y: auto; padding: 20px; }
  .settings-overlay.show { display: block; }
  .settings-content { max-width: 480px; margin: 0 auto; background: #181818; border-radius: 20px; padding: 24px; }
  .master-list { margin: 15px 0; max-height: 250px; overflow-y: auto; border: 1px solid #333; border-radius: 10px; padding: 5px; }
  .master-item { display: flex; align-items: center; gap: 10px; padding: 8px; border-bottom: 1px solid #222; }
  .master-item input { transform: scale(1.2); accent-color: var(--accent); }
  .master-item label { font-size: 12px; flex: 1; }

  .flash { position: fixed; inset: 0; pointer-events: none; z-index: 50; opacity: 0; }
  .flash.show { opacity: 1; transition: opacity 0.1s; }
  .flash.work { background: rgba(232,255,0,0.06); }
  .flash.rest { background: rgba(0,201,167,0.06); }
</style>
</head>
<body>

<div class="flash" id="flash"></div>

<header>
  <div class="logo">KETTLEBELL</div>
  <button style="background:none; border:none; color:var(--muted); font-size:24px;" onclick="openSettings()">⚙️</button>
</header>

<div class="timer-section">
  <div class="phase-label" id="phaseLabel">WORK</div>
  <div class="circle-wrap">
    <svg class="ring" viewBox="0 0 200 200">
      <circle class="ring-track" cx="100" cy="100" r="85"/>
      <circle class="ring-progress" id="ringProgress" cx="100" cy="100" r="85"/>
    </svg>
    <div class="timer-inner">
      <div class="timer-digits" id="timerDigits">0:00</div>
      <div class="timer-sub" id="timerSub">WORK TIME</div>
    </div>
  </div>
</div>

<div class="exercise-card" id="exCard">
  <div class="ex-number" id="exNumber">1</div>
  <div class="ex-name" id="exName">STARTING...</div>
  <div class="ex-name-jp" id="exNameJp">準備してください</div>
  <div class="ex-muscle" id="exMuscle">Target Muscle</div>
</div>

<div class="next-up">
  <div class="next-label">NEXT →</div>
  <div class="next-name" id="nextName">---</div>
</div>

<div class="stats-grid">
  <div class="stat-box">
    <span class="stat-val" id="setVal">1 / 3</span>
    <span class="stat-label">Set</span>
  </div>
  <div class="stat-box">
    <span class="stat-val" id="progressText">1 / 10</span>
    <span class="stat-label">Exercise</span>
  </div>
  <div class="stat-box">
    <span class="stat-val" id="elapsedVal">0:00</span>
    <span class="stat-label">Elapsed</span>
  </div>
</div>

<div class="progress-section">
  <div class="progress-dots" id="progressDots"></div>
</div>

<div class="controls">
  <button class="btn btn-sub" onclick="resetWorkout()">リセット</button>
  <button class="btn btn-main" id="startBtn" onclick="toggleStartPause()">スタート</button>
</div>

<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-content">
    <h2 style="font-family:'Bebas Neue'; letter-spacing:2px; text-align:center;">SETTINGS</h2>
    <div style="margin-top:15px; display:flex; justify-content:space-around; text-align:center;">
        <div><label style="font-size:10px;">WORK</label><br><input type="number" id="sWork" value="40" style="width:50px; background:#222; color:#fff; border:none; text-align:center; padding:5px;"></div>
        <div><label style="font-size:10px;">REST</label><br><input type="number" id="sRest" value="30" style="width:50px; background:#222; color:#fff; border:none; text-align:center; padding:5px;"></div>
        <div><label style="font-size:10px;">SETS</label><br><input type="number" id="sSets" value="3" style="width:40px; background:#222; color:#fff; border:none; text-align:center; padding:5px;"></div>
    </div>
    <p style="font-size:12px; margin-top:20px; color:var(--accent);">種目選択（マスターリスト）:</p>
    <div class="master-list" id="masterListUI"></div>
    <div style="display:flex; gap:10px; margin-top:20px;">
      <button class="btn btn-sub" style="flex:1" onclick="closeSettings()">閉じる</button>
      <button class="btn btn-main" style="flex:2" onclick="applySettings()">保存して適用</button>
    </div>
  </div>
</div>

<script>
// --- マスターリスト（部位情報も含む） ---
const MASTER_EXERCISES = [
  { id: 1, name: "Kettlebell Swing", jp: "ケトルベルスイング", muscle: "臀部・ハム・背中" },
  { id: 2, name: "Clean & Press (R)", jp: "クリーン＆プレス（右）", muscle: "肩・体幹" },
  { id: 3, name: "Clean & Press (L)", jp: "クリーン＆プレス（左）", muscle: "肩・体幹" },
  { id: 4, name: "Goblet Squat", jp: "ゴブレットスクワット", muscle: "大腿四頭筋・臀部" },
  { id: 5, name: "Bent-over Row (R)", jp: "ベントオーバーロウ（右）", muscle: "広背筋・腕" },
  { id: 6, name: "Bent-over Row (L)", jp: "ベントオーバーロウ（左）", muscle: "広背筋・腕" },
  { id: 7, name: "Romanian Deadlift", jp: "ルーマニアンDL", muscle: "ハムストリングス" },
  { id: 8, name: "Split Squat (R)", jp: "スプリットスクワット（右）", muscle: "脚・体幹" },
  { id: 9, name: "Split Squat (L)", jp: "スプリットスクワット（左）", muscle: "脚・体幹" },
  { id: 10, name: "Shoulder Press (R)", jp: "ショルダープレス（右）", muscle: "肩・腕" },
  { id: 11, name: "Shoulder Press (L)", jp: "ショルダープレス（左）", muscle: "肩・腕" },
  { id: 12, name: "French Press", jp: "フレンチプレス", muscle: "上腕三頭筋" },
  { id: 13, name: "Kettlebell Halo", jp: "ケトルベル・ハロー", muscle: "肩・胸・可動域" },
  { id: 14, name: "Suitcase Carry (R)", jp: "スーツケースキャリー（右）", muscle: "体幹安定" },
  { id: 15, name: "Suitcase Carry (L)", jp: "スーツケースキャリー（左）", muscle: "体幹安定" },
  { id: 16, name: "Lunge (R)", jp: "ランジ（右）", muscle: "下半身・バランス" },
  { id: 17, name: "Lunge (L)", jp: "ランジ（左）", muscle: "下半身・バランス" },
  { id: 18, name: "Russian Twist", jp: "ロシアンツイスト", muscle: "腹斜筋・体幹" },
  { id: 19, name: "Upright Row", jp: "アップライトロウ", muscle: "僧帽筋・肩" },
  { id: 20, name: "Snatch", jp: "ケトルベル・スナッチ", muscle: "全身パワー" }
];

let selectedExIds = [1, 2, 3, 4, 5, 6, 7, 12, 13, 20];
let workoutList = [];
let WORK = 40, REST = 30, TOTAL_SETS = 3;

let currentExIdx = 0, currentSet = 1, isWork = true, isPreparing = false;
let timeLeft = WORK, isRunning = false, interval = null, wakeLock = null;
let elapsedSeconds = 0, elapsedInterval = null;

let audioCtx = null;
function beep(f, d) {
  try {
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
    osc.connect(g); g.connect(audioCtx.destination);
    osc.frequency.value = f; g.gain.setValueAtTime(0.5, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
    osc.start(); osc.stop(audioCtx.currentTime + d);
  } catch(e){}
}

function init() {
  workoutList = MASTER_EXERCISES.filter(ex => selectedExIds.includes(ex.id));
  const masterUI = document.getElementById('masterListUI');
  masterUI.innerHTML = MASTER_EXERCISES.map(ex => `
    <div class="master-item">
      <input type="checkbox" id="ex${ex.id}" ${selectedExIds.includes(ex.id)?'checked':''}>
      <label for="ex${ex.id}">${ex.name}<br><span style="color:#666; font-size:10px;">${ex.jp}</span></label>
    </div>
  `).join('');
  buildDots();
  updateUI();
}

function buildDots() {
  document.getElementById('progressDots').innerHTML = workoutList.map((_, i) => `<div class="dot" id="dot${i}"></div>`).join('');
}

function formatElapsed(s) { const m = Math.floor(s/60), sec = s%60; return `${m}:${sec<10?'0':''}${sec}`; }

function updateUI() {
  const ex = workoutList[currentExIdx];
  const nextEx = workoutList[(currentExIdx + 1) % workoutList.length];
  const ring = document.getElementById('ringProgress');
  const digits = document.getElementById('timerDigits');
  
  if (isPreparing) {
    document.getElementById('phaseLabel').textContent = "PREPARE";
    document.getElementById('phaseLabel').className = "phase-label prepare";
    digits.textContent = timeLeft;
    ring.style.stroke = "var(--accent2)";
  } else {
    document.getElementById('phaseLabel').textContent = isWork ? "WORK" : "REST";
    document.getElementById('phaseLabel').className = isWork ? "phase-label" : "phase-label rest";
    digits.textContent = `0:${timeLeft < 10 ? '0' : ''}${timeLeft}`;
    ring.style.stroke = isWork ? "var(--work-color)" : "var(--rest-color)";
  }

  const total = isPreparing ? 5 : (isWork ? WORK : REST);
  ring.style.strokeDashoffset = 502 * (1 - timeLeft / total);

  document.getElementById('exName').textContent = ex.name;
  document.getElementById('exNameJp').textContent = ex.jp;
  document.getElementById('exMuscle').textContent = isWork ? ex.muscle : "インターバル";
  document.getElementById('exNumber').textContent = currentExIdx + 1;
  document.getElementById('nextName').textContent = isWork ? `REST (${REST}s)` : nextEx.jp;

  // ステータス更新
  document.getElementById('setVal').textContent = `${currentSet} / ${TOTAL_SETS}`;
  document.getElementById('progressText').textContent = `${currentExIdx+1} / ${workoutList.length}`;
  document.getElementById('elapsedVal').textContent = formatElapsed(elapsedSeconds);

  workoutList.forEach((_, i) => {
    const dot = document.getElementById('dot'+i);
    if(dot) dot.className = `dot ${i < currentExIdx ? 'done' : (i === currentExIdx ? 'active' : '')}`;
  });
}

function tick() {
  timeLeft--;
  if (timeLeft < 0) {
    if (isPreparing) {
      isPreparing = false; isWork = true; timeLeft = WORK; beep(880, 0.5);
      startElapsed();
    } else if (isWork) {
      isWork = false; timeLeft = REST; flash('rest'); beep(440, 0.3);
    } else {
      currentExIdx++;
      if (currentExIdx >= workoutList.length) {
        if (currentSet >= TOTAL_SETS) {
          clearInterval(interval); clearInterval(elapsedInterval); isRunning = false;
          alert("トレーニング終了！お疲れ様でした。"); return;
        }
        currentSet++; currentExIdx = 0;
      }
      isWork = true; timeLeft = WORK; flash('work'); beep(880, 0.5);
    }
  } else if (timeLeft <= 3) { beep(660, 0.1); }
  updateUI();
}

function startElapsed() {
  if (elapsedInterval) clearInterval(elapsedInterval);
  elapsedInterval = setInterval(() => { elapsedSeconds++; updateUI(); }, 1000);
}

async function toggleStartPause() {
  if (isRunning) {
    clearInterval(interval); clearInterval(elapsedInterval); isRunning = false;
    document.getElementById('startBtn').textContent = "つづける";
    if(wakeLock) wakeLock.release();
  } else {
    if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
    if (currentExIdx === 0 && currentSet === 1 && !isPreparing && elapsedSeconds === 0) {
      isPreparing = true; timeLeft = 5;
    } else {
      startElapsed();
    }
    interval = setInterval(tick, 1000); isRunning = true;
    document.getElementById('startBtn').textContent = "ポーズ";
  }
}

function flash(type) {
  const f = document.getElementById('flash'); f.className = `flash ${type} show`;
  setTimeout(() => f.className = 'flash', 200);
}

function openSettings() { document.getElementById('settingsOverlay').classList.add('show'); }
function closeSettings() { document.getElementById('settingsOverlay').classList.remove('show'); }

function applySettings() {
  WORK = parseInt(document.getElementById('sWork').value);
  REST = parseInt(document.getElementById('sRest').value);
  TOTAL_SETS = parseInt(document.getElementById('sSets').value);
  selectedExIds = MASTER_EXERCISES.filter(ex => document.getElementById(`ex${ex.id}`).checked).map(ex => ex.id);
  closeSettings(); resetWorkout();
}

function resetWorkout() {
  clearInterval(interval); clearInterval(elapsedInterval); isRunning = false;
  currentExIdx = 0; currentSet = 1; isWork = true; isPreparing = false;
  timeLeft = WORK; elapsedSeconds = 0;
  document.getElementById('startBtn').textContent = "スタート";
  init();
}

init();
</script>
</body>
</html>
