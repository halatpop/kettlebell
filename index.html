<script>
// ── 追加：スリープ防止 (Wake Lock) ──
let wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      console.log('Wake Lock is active');
    }
  } catch (err) {
    console.error(`${err.name}, ${err.message}`);
  }
}

// ── 既存変数 ──
let WORK = 40, REST = 30, TOTAL_SETS = 3;
const circumference = 2 * Math.PI * 90;
let currentExIdx = 0, currentSet = 1, isWork = true;
let timeLeft = WORK, isRunning = false;
let interval = null, elapsedSeconds = 0, elapsedInterval = null;
let isPreparing = false; // 追加：開始前カウントダウンフラグ

// ...オーディオ関数(beep等)はそのまま維持...

function tick() {
  // ── 改善：開始前カウントダウン (5秒) ──
  if (isPreparing) {
    if (timeLeft > 0) {
      document.getElementById('phaseLabel').textContent = 'PREPARE';
      document.getElementById('timerDigits').textContent = timeLeft;
      soundWarning(); // カウント音
      timeLeft--;
      return;
    } else {
      isPreparing = false;
      timeLeft = WORK;
      soundRestEnd(); // 開始音
      // 経過時間タイマーを開始
      startElapsedTimer();
    }
  }

  timeLeft--;
  if (timeLeft === 5 || (timeLeft < 5 && timeLeft > 0)) soundWarning();

  if (timeLeft < 0) {
    // ...セット切り替えロジック... (省略せず既存のものを維持)
    if (isWork) {
      soundWorkEnd();
      isWork = false; timeLeft = REST; flash('rest');
    } else {
      currentExIdx++;
      if (currentExIdx >= EXERCISES.length) {
        if (currentSet >= TOTAL_SETS) {
          stopTimers();
          soundComplete();
          showFinishedOverlay();
          return;
        }
        currentSet++; currentExIdx = 0;
      }
      soundRestEnd();
      isWork = true; timeLeft = WORK; flash('work');
    }
  }
  updateUI();
}

function startElapsedTimer() {
  if (elapsedInterval) clearInterval(elapsedInterval);
  elapsedInterval = setInterval(() => {
    elapsedSeconds++;
    document.getElementById('elapsedVal').textContent = formatElapsed(elapsedSeconds);
  }, 1000);
}

function stopTimers() {
  clearInterval(interval);
  clearInterval(elapsedInterval);
  isRunning = false;
  if (wakeLock) {
    wakeLock.release();
    wakeLock = null;
  }
}

function toggleStartPause() {
  const btn = document.getElementById('startBtn');
  if (isRunning) {
    stopTimers();
    btn.textContent = 'つづける';
  } else {
    // 最初のスタート時のみ5秒カウントダウン
    if (elapsedSeconds === 0 && currentExIdx === 0 && currentSet === 1 && !isPreparing) {
      isPreparing = true;
      timeLeft = 5;
    }
    
    // スリープ防止をリクエスト
    requestWakeLock();
    
    interval = setInterval(tick, 1000);
    // 準備期間中でなければ経過時間タイマーを回す
    if (!isPreparing) startElapsedTimer();
    
    isRunning = true;
    btn.textContent = 'ポーズ';
  }
}

// ...残りのupdateUI、resetWorkoutなどは既存のロジックを維持...
</script>
